<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System - Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .btn {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            color: black;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .submit-btn {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .success {
            background: #2ecc71;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏫 School Management System - Test Version</h1>
        <p>यह test version है - अगर यहाँ forms काम करते हैं तो main file में भी करेंगे!</p>
        
        <button class="btn" onclick="openStudentModal()">Add Student (Test)</button>
        <button class="btn" onclick="openTeacherModal()">Add Teacher (Test)</button>
        <button class="btn" onclick="showAllData()">Show All Added Data</button>
        
        <div id="result" class="success">Forms are working perfectly! ✅</div>
        
        <!-- Data Display Area -->
        <div id="dataDisplay" style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-top: 20px; display: none;">
            <h3>Added Students:</h3>
            <div id="studentsList"></div>
            <h3>Added Teachers:</h3>
            <div id="teachersList"></div>
        </div>
    </div>

    <!-- Student Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('studentModal')">&times;</span>
            <h2>Add New Student</h2>
            <div id="studentSuccess" class="success"></div>
            <form id="studentForm" onsubmit="return addStudent(event)">
                <div class="form-group">
                    <label for="studentName">Student Name *</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="form-group">
                    <label for="studentClass">Class *</label>
                    <input type="text" id="studentClass" required placeholder="e.g., 10A">
                </div>
                <div class="form-group">
                    <label for="studentEmail">Email *</label>
                    <input type="email" id="studentEmail" required>
                </div>
                <button type="submit" class="submit-btn">Add Student</button>
            </form>
        </div>
    </div>

    <!-- Teacher Modal -->
    <div id="teacherModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('teacherModal')">&times;</span>
            <h2>Add New Teacher</h2>
            <div id="teacherSuccess" class="success"></div>
            <form id="teacherForm" onsubmit="return addTeacher(event)">
                <div class="form-group">
                    <label for="teacherName">Teacher Name *</label>
                    <input type="text" id="teacherName" required>
                </div>
                <div class="form-group">
                    <label for="teacherSubject">Subject *</label>
                    <input type="text" id="teacherSubject" required>
                </div>
                <div class="form-group">
                    <label for="teacherSalary">Salary (INR) *</label>
                    <input type="number" id="teacherSalary" required placeholder="50000">
                </div>
                <button type="submit" class="submit-btn">Add Teacher</button>
            </form>
        </div>
    </div>

    <script>
        // Test to ensure JavaScript is working
        console.log("JavaScript loaded successfully!");
        
        // Arrays to store data
        let students = [];
        let teachers = [];
        
        function openStudentModal() {
            console.log("Opening student modal...");
            document.getElementById('studentModal').style.display = 'block';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').innerHTML = 'Student Form Opened Successfully! ✅';
        }

        function openTeacherModal() {
            console.log("Opening teacher modal...");
            document.getElementById('teacherModal').style.display = 'block';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').innerHTML = 'Teacher Form Opened Successfully! ✅';
        }

        function closeModal(modalId) {
            console.log("Closing modal:", modalId);
            document.getElementById(modalId).style.display = 'none';
        }

        function addStudent(event) {
            event.preventDefault();
            const name = document.getElementById('studentName').value;
            const className = document.getElementById('studentClass').value;
            const email = document.getElementById('studentEmail').value;
            
            console.log('Adding student:', {name, className, email});
            
            // Create student object
            const student = {
                id: 'S' + (students.length + 1).toString().padStart(3, '0'),
                name: name,
                class: className,
                email: email,
                addedAt: new Date().toLocaleString()
            };
            
            // Add to array
            students.push(student);
            console.log('Student added to array:', student);
            console.log('Total students:', students.length);
            
            document.getElementById('studentSuccess').innerHTML = 
                `Student Added: ${name}, Class: ${className}, Email: ${email} ✅`;
            document.getElementById('studentSuccess').style.display = 'block';
            
            document.getElementById('result').innerHTML = 
                `NEW STUDENT ADDED: ${name} in Class ${className} ✅<br>Total Students: ${students.length}`;
            document.getElementById('result').style.display = 'block';
            
            document.getElementById('studentForm').reset();
            updateDataDisplay();
            return false;
        }

        function addTeacher(event) {
            event.preventDefault();
            const name = document.getElementById('teacherName').value;
            const subject = document.getElementById('teacherSubject').value;
            const salary = document.getElementById('teacherSalary').value;
            
            console.log('Adding teacher:', {name, subject, salary});
            
            // Create teacher object
            const teacher = {
                id: 'T' + (teachers.length + 1).toString().padStart(3, '0'),
                name: name,
                subject: subject,
                salary: parseInt(salary),
                qrCode: 'TEACH' + (teachers.length + 1).toString().padStart(3, '0') + name.split(' ')[0].toUpperCase(),
                addedAt: new Date().toLocaleString()
            };
            
            // Add to array
            teachers.push(teacher);
            console.log('Teacher added to array:', teacher);
            console.log('Total teachers:', teachers.length);
            
            document.getElementById('teacherSuccess').innerHTML = 
                `Teacher Added: ${name}, Subject: ${subject}, Salary: ₹${salary} ✅`;
            document.getElementById('teacherSuccess').style.display = 'block';
            
            document.getElementById('result').innerHTML = 
                `NEW TEACHER ADDED: ${name} (${subject}) - Salary: ₹${salary} ✅<br>Total Teachers: ${teachers.length}`;
            document.getElementById('result').style.display = 'block';
            
            document.getElementById('teacherForm').reset();
            updateDataDisplay();
            return false;
        }
        
        function showAllData() {
            console.log('All Students:', students);
            console.log('All Teachers:', teachers);
            
            const display = document.getElementById('dataDisplay');
            display.style.display = 'block';
            
            updateDataDisplay();
        }
        
        function updateDataDisplay() {
            const studentsList = document.getElementById('studentsList');
            const teachersList = document.getElementById('teachersList');
            
            studentsList.innerHTML = students.length === 0 ? 'No students added yet.' : 
                students.map(s => `<div style="background: rgba(255,255,255,0.1); padding: 10px; margin: 5px; border-radius: 8px;">
                    <strong>${s.name}</strong> - Class: ${s.class} - Email: ${s.email}<br>
                    <small>Added: ${s.addedAt}</small>
                </div>`).join('');
            
            teachersList.innerHTML = teachers.length === 0 ? 'No teachers added yet.' : 
                teachers.map(t => `<div style="background: rgba(255,255,255,0.1); padding: 10px; margin: 5px; border-radius: 8px;">
                    <strong>${t.name}</strong> - Subject: ${t.subject} - Salary: ₹${t.salary}<br>
                    QR Code: ${t.qrCode}<br>
                    <small>Added: ${t.addedAt}</small>
                </div>`).join('');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        // Show ready message
        window.onload = function() {
            console.log("Page loaded successfully!");
            setTimeout(() => {
                document.getElementById('result').innerHTML = 'Ready to test! Click the buttons above. 🚀';
                document.getElementById('result').style.display = 'block';
            }, 1000);
        }
    </script>
</body>
</html>
